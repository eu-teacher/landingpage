<svg viewBox="0 0 220 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .ink { fill: none; stroke: #2B1A11; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; }
      .gutter { fill: #2B1A11; }
      .leaf { fill: #B8552E; stroke: none; }
      .leafLight { fill: #D88E5A; stroke: none; }
      .vein { stroke: #2B1A11; stroke-width: 1.4; stroke-linecap: round; opacity: 0.55; }
      .stem { fill: none; stroke: #B8552E; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <!-- ===== PLANT ===== -->
  <path class="stem" d="M110 249 C110 225, 109 185, 110 145 C111 115, 112 85, 110 68"/>

  <!-- small left leaf (lowest) -->
  <g transform="translate(99,201) rotate(-150)">
    <path class="leafLight" d="M0,0 C8,-5 12,-15 0,-28 C-12,-15 -8,-5 0,0 Z"/>
    <line class="vein" x1="0" y1="-2" x2="0" y2="-24"/>
  </g>

  <!-- small-medium right leaf -->
  <g transform="translate(122,173) rotate(32)">
    <path class="leaf" d="M0,0 C10,-6 15,-19 0,-34 C-15,-19 -10,-6 0,0 Z"/>
    <line class="vein" x1="0" y1="-3" x2="0" y2="-29"/>
  </g>

  <!-- medium left leaf -->
  <g transform="translate(97,139) rotate(-208)">
    <path class="leaf" d="M0,0 C13,-8 19,-24 0,-44 C-19,-24 -13,-8 0,0 Z"/>
    <line class="vein" x1="0" y1="-3" x2="0" y2="-38"/>
  </g>

  <!-- large right leaf -->
  <g transform="translate(123,101) rotate(38)">
    <path class="leaf" d="M0,0 C15,-9 23,-29 0,-53 C-23,-29 -15,-9 0,0 Z"/>
    <line class="vein" x1="0" y1="-3" x2="0" y2="-46"/>
  </g>

  <!-- apex leaf (largest) -->
  <g transform="translate(110,68) rotate(2)">
    <path class="leaf" d="M0,0 C16,-9 24,-30 0,-58 C-24,-30 -16,-9 0,0 Z"/>
    <line class="vein" x1="0" y1="-3" x2="0" y2="-50"/>
  </g>

  <!-- ===== OPEN BOOK ===== -->
  <path class="gutter" d="M92,250 C98,264 122,264 128,250 C120,258 100,258 92,250 Z"/>

  <path class="ink" d="M16,236 C46,220 78,230 96,254"/>
  <path class="ink" d="M20,244 C48,230 76,238 98,260"/>
  <path class="ink" d="M16,236 L16,162 C16,156 21,152 27,153 C55,158 84,172 100,204 C106,216 110,232 110,250"/>

  <path class="ink" d="M204,236 C174,220 142,230 124,254"/>
  <path class="ink" d="M200,244 C172,230 144,238 122,260"/>
  <path class="ink" d="M204,236 L204,162 C204,156 199,152 193,153 C165,158 136,172 120,204 C114,216 110,232 110,250"/>
</svg>
